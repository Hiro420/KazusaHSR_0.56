name: Cross-Platform Build

permissions:
  actions: write
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - "**.cs"
  pull_request:
    branches:
      - main
    paths:
      - "**.cs"
  workflow_dispatch:

jobs:
  package:
    name: Compile and Package
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - rid: win-x64
            mode: bundled
            single_file: true
            output: artifacts/win-x64-bundled
          - rid: linux-x64
            mode: bundled
            single_file: true
            output: artifacts/linux-x64-bundled
          - rid: linux-arm64
            mode: bundled
            single_file: true
            output: artifacts/linux-arm64-bundled
          - rid: win-x64
            mode: expanded
            single_file: false
            output: artifacts/win-x64-expanded
          - rid: linux-x64
            mode: expanded
            single_file: false
            output: artifacts/linux-x64-expanded
          - rid: linux-arm64
            mode: expanded
            single_file: false
            output: artifacts/linux-arm64-expanded

    steps:
      - name: Fetch source
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore project packages
        run: dotnet restore

      - name: Publish for ${{ matrix.rid }} (${{ matrix.mode }})
        run: >
          dotnet publish Program\Program.csproj
          --configuration Release
          --framework net8.0
          --runtime ${{ matrix.rid }}
          --output ${{ matrix.output }}
          -p:PublishSingleFile=${{ matrix.single_file }}

      - name: Store package ${{ matrix.rid }}-${{ matrix.mode }}
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.rid }}-${{ matrix.mode }}
          path: ${{ matrix.output }}

  prune-artifacts:
    name: Remove Previous Artifacts
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Delete artifacts from older runs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const currentRun = process.env.GITHUB_RUN_ID;

            const { data } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            for (const item of data.artifacts) {
              if (item.workflow_run && item.workflow_run.id.toString() !== currentRun) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: item.id
                });
              }
            }
